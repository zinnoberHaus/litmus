name: "Litmus test"
description: >
  Run `litmus test` on a Litmus project — every tests/*.sql must return zero
  rows. Exits non-zero if any data test fails, so it gates a pull request.
author: "Litmus Contributors"
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  working-directory:
    description: "Path to the Litmus project (contains tests/ and the warehouse)."
    required: false
    default: "."
  python-version:
    description: "Python version to install Litmus on."
    required: false
    default: "3.12"
  litmus-version:
    description: "Version of the litmus-data package to install (pin for reproducible CI)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install litmus-data
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [[ -n "${{ inputs.litmus-version }}" ]]; then
          pip install "litmus-data==${{ inputs.litmus-version }}"
        else
          pip install "litmus-data"
        fi

    - name: Run litmus test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: litmus test
