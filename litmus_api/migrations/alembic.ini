# Alembic configuration for the Litmus API catalog database.
#
# The sqlalchemy.url is intentionally *empty* — env.py reads the URL from
# litmus_api.config.Settings().database_url so the same config works for
# dev (sqlite), CI (sqlite in-memory), and prod (Postgres via LITMUS_DATABASE_URL).
#
# Run migrations from the repo root:
#   alembic -c litmus_api/migrations/alembic.ini upgrade head

[alembic]
script_location = %(here)s
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
