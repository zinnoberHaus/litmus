# Ingest spec for the customers CSV.
# Idempotent — running again replaces the table.

source:
  type: csv
  path: ./data/raw/customers.csv

target:
  table: raw_customers
  mode: replace
  primary_key: customer_id

schedule: manual   # human-triggered; not on a cron yet

columns:
  - { name: customer_id, type: VARCHAR }
  - { name: name,        type: VARCHAR }
  - { name: email,       type: VARCHAR }
  - { name: country,     type: VARCHAR }
  - { name: signup_at,   type: TIMESTAMP }
