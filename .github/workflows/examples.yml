name: Examples smoke test

on:
  push:
    branches: [main]
    paths:
      - "litmus/**"
      - ".github/workflows/examples.yml"
  pull_request:
    paths:
      - "litmus/**"
      - ".github/workflows/examples.yml"

jobs:
  smoke:
    name: "init → run → test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Litmus
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Set up a project from the bundled sample
        run: |
          mkdir -p /tmp/demo
          cd /tmp/demo
          litmus init . --yes --source sample

      - name: Run the pipeline + data tests
        working-directory: /tmp/demo
        run: |
          litmus run
          litmus test

      - name: Assert the house was built
        working-directory: /tmp/demo
        run: |
          test -f litmus.yaml
          test -d sources && test -d transforms && test -d tests
          test -f .claude/agents/data-architect.md
          test -f data/warehouse.duckdb
