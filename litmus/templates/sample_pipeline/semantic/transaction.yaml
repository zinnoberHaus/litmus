entity: transaction
kind: fact
table: raw_transactions
primary_key: transaction_id
description: Every paid or refunded charge across all markets.

dimensions:
  - name: product
    type: string
    description: Product or plan SKU (Pro Plan, Team Plan, Starter, Add-on Storage).
  - name: currency
    type: string
  - name: status
    type: string
    description: "Lifecycle: 'paid', 'refunded', 'pending'."
  - name: transacted_at
    type: timestamp
    description: When the transaction occurred.

measures:
  - name: amount
    description: Transaction amount in the local currency.
    aggregation: sum
  - name: transaction_count
    description: Number of transactions.
    aggregation: count
  - name: paid_revenue
    description: Sum of amount for transactions where status = 'paid'.
    aggregation: sum
    source: amount
    filter: status = 'paid'

joins:
  - to: customer
    on: transactions.customer_id = customers.customer_id
  - to: market
    on: transactions.market_id = markets.market_id
