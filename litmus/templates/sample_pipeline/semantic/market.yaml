entity: market
kind: dimension
table: raw_markets
primary_key: market_id
description: Geographic / business segments we operate in.

dimensions:
  - name: name
    type: string
  - name: region
    type: string
    description: High-level region (Americas, EMEA, APAC).
  - name: currency
    type: string
    description: Local currency of the market (USD, EUR, GBP, …).
  - name: tier
    type: string
    description: Business tier — "enterprise" or "growth".
  - name: launched_at
    type: timestamp

measures:
  - name: revenue
    description: Total paid revenue from transactions in this market.
    aggregation: sum
    source: transactions.amount
    filter: transactions.status = 'paid'
  - name: customer_count
    description: Distinct customers who transacted in this market.
    aggregation: count_distinct
    source: transactions.customer_id

joins:
  - to: customer
    on: markets.market_id = customers.primary_market_id
  - to: transaction
    on: markets.market_id = transactions.market_id
