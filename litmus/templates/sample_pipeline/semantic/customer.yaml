entity: customer
kind: dimension
table: raw_customers
primary_key: customer_id
description: People who signed up to use our product.

dimensions:
  - name: name
    type: string
    description: Customer display name.
  - name: email
    type: string
  - name: country
    type: string
    description: Two-letter ISO country code where the customer is based.
  - name: signup_at
    type: timestamp
    description: When they first signed up.

joins:
  - to: market
    on: customers.primary_market_id = markets.market_id
    description: Each customer has a primary market based on their region at signup.
  - to: transaction
    on: customers.customer_id = transactions.customer_id
