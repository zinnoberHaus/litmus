# Single-tenant OSS deployment of Litmus.
#
#   docker compose -f deploy/docker-compose.yml up
#
#   UI:   http://localhost:3000
#   API:  http://localhost:8000   (docs at /docs)
#   DB:   postgres on :5432       (creds: litmus / litmus)
#
# The warehouse is BYO — point `LITMUS_WAREHOUSE_*` env vars at your own
# DuckDB/Postgres/Snowflake/BigQuery. This compose only provisions the
# catalog/history DB that backs the metric detail page.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: litmus
      POSTGRES_PASSWORD: litmus
      POSTGRES_DB: litmus
    volumes:
      - litmus_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litmus -d litmus"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      LITMUS_DATABASE_URL: postgresql+psycopg2://litmus:litmus@postgres:5432/litmus
      LITMUS_TENANT_MODE: single
      LITMUS_DEFAULT_ORG: default
      LITMUS_EMBED_CACHE_SECONDS: "600"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  ui:
    build:
      context: ../ui
      dockerfile: ../deploy/Dockerfile.ui
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_LITMUS_API: http://localhost:8000
      LITMUS_API_INTERNAL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  litmus_pgdata:
